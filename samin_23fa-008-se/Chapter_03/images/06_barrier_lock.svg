<svg viewBox="0 0 860 280" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06080f"/>
      <stop offset="100%" style="stop-color:#0c1120"/>
    </linearGradient>
    <marker id="arr6" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arr6g" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="860" height="280" fill="url(#bg6)" rx="12"/>
  <rect width="860" height="280" fill="none" stroke="#1a2540" stroke-width="1" rx="12"/>

  <text x="40" y="38" fill="#f97316" font-size="9" letter-spacing="4" font-weight="700">BARRIER + LOCK SYNCHRONIZATION</text>
  <line x1="40" y1="48" x2="820" y2="48" stroke="#1a2540" stroke-width="1"/>

  <!-- WITH BARRIER side -->
  <text x="175" y="72" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">With Barrier — p1, p2</text>

  <!-- p1 -->
  <rect x="40" y="88" width="130" height="44" fill="#101828" stroke="#a78bfa" stroke-width="1.5" rx="6"/>
  <text x="105" y="108" fill="#a78bfa" font-size="10" font-weight="700" text-anchor="middle">p1</text>
  <text x="105" y="124" fill="#64748b" font-size="9" text-anchor="middle">test_with_barrier</text>

  <!-- p2 -->
  <rect x="40" y="148" width="130" height="44" fill="#101828" stroke="#a78bfa" stroke-width="1.5" rx="6"/>
  <text x="105" y="168" fill="#a78bfa" font-size="10" font-weight="700" text-anchor="middle">p2</text>
  <text x="105" y="184" fill="#64748b" font-size="9" text-anchor="middle">test_with_barrier</text>

  <!-- Arrows to barrier -->
  <line x1="172" y1="110" x2="224" y2="130" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr6)"/>
  <line x1="172" y1="170" x2="224" y2="150" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr6)"/>

  <!-- Barrier gate -->
  <rect x="228" y="108" width="80" height="64" fill="rgba(167,139,250,0.10)" stroke="#a78bfa" stroke-width="2" rx="6"/>
  <text x="268" y="132" fill="#a78bfa" font-size="9" font-weight="700" text-anchor="middle">BARRIER</text>
  <text x="268" y="148" fill="#a78bfa" font-size="8" text-anchor="middle">n = 2</text>
  <text x="268" y="162" fill="#64748b" font-size="8" text-anchor="middle">wait()</text>

  <!-- Arrow barrier to Lock -->
  <line x1="310" y1="140" x2="348" y2="140" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr6)"/>
  <text x="329" y="132" fill="#64748b" font-size="8" text-anchor="middle">both</text>
  <text x="329" y="142" fill="#64748b" font-size="8" text-anchor="middle">arrived</text>

  <!-- Lock -->
  <rect x="350" y="118" width="80" height="44" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1.5" rx="6"/>
  <text x="390" y="138" fill="#a78bfa" font-size="9" font-weight="700" text-anchor="middle">Lock</text>
  <text x="390" y="152" fill="#64748b" font-size="8" text-anchor="middle">serializer</text>

  <!-- Output -->
  <rect x="450" y="88" width="160" height="88" fill="#101828" stroke="#1a2540" rx="6"/>
  <text x="530" y="110" fill="#34d399" font-size="9" font-weight="700" text-anchor="middle">Output:</text>
  <text x="530" y="128" fill="#e2e8f0" font-size="8" text-anchor="middle">p1  12:00:00.201</text>
  <text x="530" y="144" fill="#e2e8f0" font-size="8" text-anchor="middle">p2  12:00:00.201</text>
  <text x="530" y="164" fill="#34d399" font-size="8" text-anchor="middle">← identical timestamps!</text>

  <line x1="432" y1="140" x2="448" y2="140" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr6)"/>

  <!-- Divider -->
  <line x1="640" y1="60" x2="640" y2="260" stroke="#1a2540" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- WITHOUT BARRIER side -->
  <text x="750" y="72" fill="#38bdf8" font-size="11" font-weight="700" text-anchor="middle">Without Barrier — p3, p4</text>

  <rect x="660" y="88" width="180" height="44" fill="#101828" stroke="#38bdf8" stroke-width="1.5" rx="6"/>
  <text x="750" y="108" fill="#38bdf8" font-size="10" font-weight="700" text-anchor="middle">p3 — test_without_barrier</text>
  <text x="750" y="124" fill="#64748b" font-size="9" text-anchor="middle">prints timestamp immediately</text>

  <rect x="660" y="148" width="180" height="44" fill="#101828" stroke="#38bdf8" stroke-width="1.5" rx="6"/>
  <text x="750" y="168" fill="#38bdf8" font-size="10" font-weight="700" text-anchor="middle">p4 — test_without_barrier</text>
  <text x="750" y="184" fill="#64748b" font-size="9" text-anchor="middle">prints timestamp immediately</text>

  <rect x="660" y="208" width="180" height="44" fill="#101828" stroke="#1a2540" rx="6"/>
  <text x="750" y="226" fill="#64748b" font-size="9" text-anchor="middle">p3  12:00:00.123</text>
  <text x="750" y="242" fill="#64748b" font-size="9" text-anchor="middle">p4  12:00:00.124  ← different!</text>

  <text x="430" y="270" fill="#334155" font-size="9" letter-spacing="3" text-anchor="middle">CHAPTER 03 — PROCESS BASED PARALLELISM</text>
</svg>
