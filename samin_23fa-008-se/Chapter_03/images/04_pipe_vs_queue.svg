<svg viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06080f"/>
      <stop offset="100%" style="stop-color:#0c1120"/>
    </linearGradient>
    <marker id="arr4" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="arr4b" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
  </defs>
  <rect width="860" height="320" fill="url(#bg4)" rx="12"/>
  <rect width="860" height="320" fill="none" stroke="#1a2540" stroke-width="1" rx="12"/>

  <text x="40" y="38" fill="#f97316" font-size="9" letter-spacing="4" font-weight="700">COMMUNICATION — PIPE vs QUEUE</text>
  <line x1="40" y1="48" x2="820" y2="48" stroke="#1a2540" stroke-width="1"/>

  <!-- PIPE section -->
  <text x="215" y="76" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">multiprocessing.Pipe</text>
  <text x="215" y="92" fill="#64748b" font-size="9" text-anchor="middle">Point-to-point · 2 processes only</text>

  <rect x="40" y="106" width="100" height="60" fill="#101828" stroke="#34d399" stroke-width="1.5" rx="8"/>
  <text x="90" y="131" fill="#34d399" font-size="10" font-weight="700" text-anchor="middle">Process 1</text>
  <text x="90" y="147" fill="#64748b" font-size="9" text-anchor="middle">create_items</text>
  <text x="90" y="159" fill="#64748b" font-size="9" text-anchor="middle">sends 0–9</text>

  <rect x="160" y="106" width="110" height="60" fill="rgba(52,211,153,0.05)" stroke="#334155" stroke-width="1" rx="6"/>
  <text x="215" y="131" fill="#64748b" font-size="9" font-weight="700" text-anchor="middle">[ PIPE ]</text>
  <text x="215" y="147" fill="#334155" font-size="8" text-anchor="middle">output end →</text>
  <text x="215" y="161" fill="#334155" font-size="8" text-anchor="middle">→ input end</text>

  <rect x="290" y="106" width="110" height="60" fill="#101828" stroke="#34d399" stroke-width="1.5" rx="8"/>
  <text x="345" y="131" fill="#34d399" font-size="10" font-weight="700" text-anchor="middle">Process 2</text>
  <text x="345" y="147" fill="#64748b" font-size="9" text-anchor="middle">multiply_items</text>
  <text x="345" y="159" fill="#64748b" font-size="9" text-anchor="middle">squares items</text>

  <line x1="142" y1="136" x2="158" y2="136" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr4)"/>
  <line x1="272" y1="136" x2="288" y2="136" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr4)"/>

  <!-- Pipe pros/cons -->
  <rect x="40" y="180" width="360" height="60" fill="#101828" stroke="#1a2540" rx="6"/>
  <text x="60" y="200" fill="#34d399" font-size="9">✅  Fastest — low overhead, direct channel</text>
  <text x="60" y="216" fill="#34d399" font-size="9">✅  Best for simple 2-process pipelines</text>
  <text x="60" y="232" fill="#f43f5e" font-size="9">⚠️  Only 2 endpoints · Not thread-safe by default</text>

  <!-- Divider -->
  <line x1="430" y1="60" x2="430" y2="300" stroke="#1a2540" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- QUEUE section -->
  <text x="645" y="76" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">multiprocessing.Queue</text>
  <text x="645" y="92" fill="#64748b" font-size="9" text-anchor="middle">Multi-producer · Multi-consumer · Thread-safe</text>

  <!-- Producers -->
  <rect x="450" y="106" width="80" height="40" fill="#101828" stroke="#a78bfa" stroke-width="1.5" rx="6"/>
  <text x="490" y="123" fill="#a78bfa" font-size="9" font-weight="700" text-anchor="middle">Producer</text>
  <text x="490" y="137" fill="#64748b" font-size="8" text-anchor="middle">queue.put()</text>

  <rect x="450" y="156" width="80" height="40" fill="#101828" stroke="#a78bfa" stroke-width="1.5" rx="6"/>
  <text x="490" y="173" fill="#a78bfa" font-size="9" font-weight="700" text-anchor="middle">Producer</text>
  <text x="490" y="187" fill="#64748b" font-size="8" text-anchor="middle">queue.put()</text>

  <!-- Queue box -->
  <rect x="556" y="96" width="100" height="108" fill="rgba(167,139,250,0.05)" stroke="#a78bfa" stroke-width="1.5" rx="8"/>
  <text x="606" y="118" fill="#a78bfa" font-size="9" font-weight="700" text-anchor="middle">[ QUEUE ]</text>
  <rect x="568" y="126" width="76" height="14" fill="rgba(167,139,250,0.15)" rx="3"/>
  <rect x="568" y="146" width="76" height="14" fill="rgba(167,139,250,0.10)" rx="3"/>
  <rect x="568" y="166" width="76" height="14" fill="rgba(167,139,250,0.06)" rx="3"/>
  <text x="606" y="200" fill="#64748b" font-size="8" text-anchor="middle">FIFO · thread-safe</text>

  <!-- Consumers -->
  <rect x="682" y="106" width="80" height="40" fill="#101828" stroke="#38bdf8" stroke-width="1.5" rx="6"/>
  <text x="722" y="123" fill="#38bdf8" font-size="9" font-weight="700" text-anchor="middle">Consumer</text>
  <text x="722" y="137" fill="#64748b" font-size="8" text-anchor="middle">queue.get()</text>

  <rect x="682" y="156" width="80" height="40" fill="#101828" stroke="#38bdf8" stroke-width="1.5" rx="6"/>
  <text x="722" y="173" fill="#38bdf8" font-size="9" font-weight="700" text-anchor="middle">Consumer</text>
  <text x="722" y="187" fill="#64748b" font-size="8" text-anchor="middle">queue.get()</text>

  <line x1="532" y1="126" x2="554" y2="140" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr4b)"/>
  <line x1="532" y1="176" x2="554" y2="160" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr4b)"/>
  <line x1="658" y1="140" x2="680" y2="126" stroke="#38bdf8" stroke-width="1.5"/>
  <polygon points="678,121 685,126 679,132" fill="#38bdf8"/>
  <line x1="658" y1="160" x2="680" y2="176" stroke="#38bdf8" stroke-width="1.5"/>
  <polygon points="678,181 685,176 679,170" fill="#38bdf8"/>

  <!-- Queue pros/cons -->
  <rect x="450" y="220" width="375" height="44" fill="#101828" stroke="#1a2540" rx="6"/>
  <text x="470" y="238" fill="#a78bfa" font-size="9">✅  Multiple producers &amp; consumers · Built-in locking</text>
  <text x="470" y="254" fill="#f43f5e" font-size="9">⚠️  Slightly more overhead than Pipe</text>

  <text x="430" y="300" fill="#334155" font-size="9" letter-spacing="3" text-anchor="middle">CHAPTER 03 — PROCESS BASED PARALLELISM</text>
</svg>
